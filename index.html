<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="./img/favicon.jpg">
    <title>HuyLearn – Học cùng Huy</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

        :root {
            --ink: #0F0E0D;
            --paper: #F5F2EC;
            --warm: #EDE8DF;
            --rule: #D8D0C4;
            --accent: #D4541A;
            --muted: #7A7268;
            --card-bg: #FDFCF9;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--paper);
            color: var(--ink);
            min-height: 100vh;
        }

        header {
            border-bottom: 1.5px solid var(--rule);
            padding: 0 48px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--paper);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo {
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 1rem;
        }

        .logo span {
            color: var(--accent);
        }

        .header-tag {
            font-size: .75rem;
            font-weight: 500;
            color: var(--muted);
            letter-spacing: .08em;
            text-transform: uppercase;
            border: 1px solid var(--rule);
            border-radius: 20px;
            padding: 4px 12px;
        }

        .hero {
            padding: 80px 48px 60px;
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 40px;
            align-items: end;
            border-bottom: 1.5px solid var(--rule);
        }

        .hero-eyebrow {
            font-size: .72rem;
            font-weight: 700;
            letter-spacing: .14em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .hero-eyebrow::before {
            content: '';
            display: block;
            width: 24px;
            height: 2px;
            background: var(--accent);
        }

        .hero-title {
            font-size: clamp(2.4rem, 5vw, 3.8rem);
            font-weight: 700;
            line-height: 1.08;
            letter-spacing: -.03em;
            margin-bottom: 20px;
        }

        .hero-title em {
            font-style: normal;
            color: var(--accent);
            border-bottom: 3px solid var(--accent);
        }

        .hero-sub {
            font-size: 1rem;
            color: var(--muted);
            line-height: 1.7;
            max-width: 480px;
        }

        .stat-num {
            font-family: 'Space Mono', monospace;
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1;
            text-align: right;
        }

        .stat-label {
            font-size: .75rem;
            font-weight: 500;
            color: var(--muted);
            letter-spacing: .06em;
            text-transform: uppercase;
            margin-top: 4px;
            text-align: right;
        }

        .section {
            max-width: 1100px;
            margin: 0 auto;
            padding: 56px 48px;
        }

        .section-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 32px;
            border-bottom: 1.5px solid var(--rule);
            padding-bottom: 16px;
        }

        .section-title {
            font-size: .72rem;
            font-weight: 700;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .section-count {
            font-family: 'Space Mono', monospace;
            font-size: .72rem;
            color: var(--rule);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5px;
            background: var(--rule);
            border: 1.5px solid var(--rule);
            border-radius: 16px;
            overflow: hidden;
        }

        .course-card {
            background: var(--card-bg);
            padding: 32px 28px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            transition: background .18s ease;
            position: relative;
            overflow: hidden;
            min-height: 220px;
        }

        .course-card:hover {
            background: var(--warm);
        }

        .course-card:hover .card-arrow {
            transform: translate(3px, -3px);
        }

        .card-tag {
            font-size: .68rem;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -.02em;
            line-height: 1.25;
            margin-bottom: 10px;
        }

        .card-desc {
            font-size: .85rem;
            color: var(--muted);
            line-height: 1.6;
            flex: 1;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid var(--rule);
        }

        .card-meta {
            font-family: 'Space Mono', monospace;
            font-size: .7rem;
            color: var(--muted);
        }

        .card-arrow {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1.5px solid var(--rule);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .9rem;
            transition: transform .2s ease;
            flex-shrink: 0;
        }

        .badge {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: .62rem;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            padding: 3px 10px;
            border-radius: 20px;
        }

        .badge-new {
            background: var(--accent);
            color: #fff;
        }

        .badge-ready {
            background: #E8F0FE;
            color: #2D6BE4;
        }

        .progress-track {
            height: 3px;
            background: var(--rule);
            border-radius: 2px;
            overflow: hidden;
            margin: 8px 0 0;
        }

        .progress-fill {
            height: 100%;
            border-radius: 2px;
        }

        /* skeleton loader */
        .skeleton {
            background: linear-gradient(90deg, var(--warm) 25%, var(--rule) 50%, var(--warm) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.2s infinite;
            border-radius: 6px;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0
            }

            100% {
                background-position: -200% 0
            }
        }

        .sk-title {
            height: 28px;
            width: 70%;
            margin-bottom: 12px;
        }

        .sk-desc {
            height: 14px;
            width: 90%;
            margin-bottom: 6px;
        }

        .sk-desc2 {
            height: 14px;
            width: 60%;
        }

        .sk-foot {
            height: 14px;
            width: 40%;
            margin-top: 24px;
        }

        footer {
            border-top: 1.5px solid var(--rule);
            padding: 24px 48px;
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .footer-mono {
            font-family: 'Space Mono', monospace;
            font-size: .72rem;
            color: var(--muted);
        }

        @media(max-width: 640px) {

            header,
            .hero,
            .section,
            footer {
                padding-left: 20px;
                padding-right: 20px;
            }

            .hero {
                grid-template-columns: 1fr;
            }

            .stat-num,
            .stat-label {
                text-align: left;
            }

            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">Huy<span>Learn</span></div>
        <div class="header-tag">Tài liệu tự học</div>
    </header>

    <main>
        <div class="hero">
            <div>
                <div class="hero-eyebrow">Personal Study Hub</div>
                <h1 class="hero-title">Học gì<br>hôm nay, <em>Huy?</em></h1>
                <p class="hero-sub">Kho tài liệu tự học của bạn — từ lập trình đến tiếng Anh. Chọn khóa, mở slide, bắt
                    đầu.</p>
            </div>
            <div>
                <div class="stat-num" id="course-count">—</div>
                <div class="stat-label">khóa học</div>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <div class="section-title">Tất cả khóa học</div>
                <div class="section-count" id="section-count">loading...</div>
            </div>
            <!-- Cards sẽ được render vào đây -->
            <div class="grid" id="course-grid"></div>
        </div>
    </main>

    <footer>
        <div class="footer-mono">© 2025 HuyLearn</div>
        <div class="footer-mono">Học chăm, code nhiều 🔥</div>
    </footer>

    <script>
        // ── Render 1 card từ object course ──────────────────────────────
        function renderCard(course) {
            const badgeClass = course.badgeType === 'new' ? 'badge-new' : 'badge-ready';

            return `
      <a class="course-card" href="${course.href}">
        <span class="badge ${badgeClass}">${course.badge}</span>

        <div class="card-tag">
          <span class="card-dot" style="background:${course.color}"></span>
          ${course.category}
        </div>

        <div class="card-title">${course.title}</div>
        <div class="card-desc">${course.description}</div>

        <div class="progress-track">
          <div class="progress-fill"
               style="width:${course.progress}%; background:${course.color}">
          </div>
        </div>

        <div class="card-footer">
          <div class="card-meta">${course.slides}</div>
          <div class="card-arrow">→</div>
        </div>
      </a>
    `;
        }

        // ── Skeleton khi đang load ───────────────────────────────────────
        function renderSkeletons(n = 3) {
            return Array.from({ length: n }, () => `
      <div class="course-card" style="pointer-events:none">
        <div class="skeleton sk-title"></div>
        <div class="skeleton sk-desc"></div>
        <div class="skeleton sk-desc2"></div>
        <div class="skeleton sk-foot"></div>
      </div>
    `).join('');
        }

        // ── Main: fetch JSON → render ────────────────────────────────────
        async function loadCourses() {
            const grid = document.getElementById('course-grid');
            const count = document.getElementById('course-count');
            const sectionCount = document.getElementById('section-count');

            // Hiện skeleton trước
            grid.innerHTML = renderSkeletons();

            try {
                const res = await fetch('./courses.json');
                const courses = await res.json();           // ← đọc file JSON

                // Render cards
                grid.innerHTML = courses.map(renderCard).join('');

                // Cập nhật số đếm
                const n = courses.length;
                count.textContent = n;
                sectionCount.textContent = String(n).padStart(2, '0') + ' courses';

            } catch (err) {
                grid.innerHTML = `
        <div style="padding:40px;color:var(--muted);font-size:.9rem;grid-column:1/-1">
          ⚠️ Không load được courses.json — hãy chạy qua local server (Live Server / Vite).
        </div>`;
                console.error(err);
            }
        }

        loadCourses();
    </script>
</body>

</html>
